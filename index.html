<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loja de telha do meu pai</title>
    <link rel="stylesheet" href="_css/style2.css">
</head>
<body>
    <script>
        alert("Bem-vindo à loja de telha do meu pai!");
    </script>
    <a href="manutecao.html">Pagina dev</a>
    <button id="index" onclick="mostrarMensagem()">Clique aqui </button>
    <h1>Loja de telha do meu pai</h1>
    <h2>Cadastro de cliente</h2>
    <form action="index.html" method="post">
        <label for="nome">Nome:</label>
        <input type="text" id="nome" name="nome" placeholder="Digite seu nome"><br><br>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" placeholder="Digite seu email"><br><br>

        <label for="dataNascimento">Data de Nascimento:</label>
        <input type="date" id="dataNascimento" name="dataNascimento"><br><br>

        <label for="cpf">CPF:</label>
        <input type="text" id="cpf" name="cpf" placeholder="Digite seu CPF"><br><br>

        <label for="telefone">Telefone:</label>
        <input type="tel" id="telefone" name="telefone" placeholder="Digite seu telefone"><br><br>

        <label for="endereco">Endereço:</label>
        <input type="text" id="endereco" name="endereco" placeholder="Digite seu endereço"><br><br>

        <input type="submit" value="Enviar">
       

        <h2>Compra</h2>
        <label for="preco"> Preço do produto:</label>
        <input type="number" id="preco"><br><br>

        <label for="quantidade"> Quantidade do produto:</label>
        <input type="number" id="quantidade" name="quantidade"><br><br>

        <button type="button" onclick="finalizarcompra()">Finalizar Compra</button>
        


    <script src="_js/script2.js"></script>
</body>
</html>
